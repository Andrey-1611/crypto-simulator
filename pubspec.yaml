name: Bitmark
description: "A new Flutter project."
publish_to: 'none'

version: 1.4.0+7


environment:
  sdk: ^3.10.0-290.4.beta

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.1.0
  auto_route: ^11.1.0
  dio: ^5.9.0
  talker_flutter: ^5.1.9
  talker_dio_logger: ^5.1.9
  talker_riverpod_logger: ^5.1.9
  flutter_screenutil: ^5.9.3
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  uuid: ^4.5.2
  json_annotation: ^4.9.0
  fluttertoast: ^9.0.0
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  google_sign_in: ^6.1.2
  auth_buttons: ^3.0.3
  package_info_plus: ^9.0.0
  flutter_native_splash: ^2.4.7
  sqflite: ^2.4.2
  fl_chart: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.10.4
  auto_route_generator: ^10.4.0
  json_serializable: ^6.11.2
  flutter_launcher_icons: ^0.14.4
  mocktail: ^1.0.4
  firebase_auth_mocks: ^0.15.1
  fake_cloud_firestore: ^4.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/


flutter_intl:
  enabled: true

flutter_launcher_icons:
  android: false
  ios: true
  image_path: 'assets/icon/icon.png'

flutter_native_splash:
  ios: true
  android: true
  color: "#141722"
  image: assets/icon/icon.png
  android_12:
    color: "#141722"
    image: assets/icon/icon.png
